name: 'Welcome New Contributors'

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome, and thanks for opening your first issue in this repository.

            We'll review it as soon as possible. In the meantime:
            - Check if there's a similar issue already open
            - Add as much detail as possible (steps to reproduce, expected behavior, environment)
            - Do not post secrets, private documents, or security vulnerability details in public issues

            If you'd like to contribute a fix, PRs are always welcome.
          pr-message: |
            Welcome, and thanks for your first pull request in this repository.

            A maintainer will review it soon. Please make sure:
            - [ ] Your changes are tested
            - [ ] Documentation is updated if needed
            - [ ] The PR description explains what and why

            Thanks for contributing.
